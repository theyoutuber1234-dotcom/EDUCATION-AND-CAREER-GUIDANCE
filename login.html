<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | EduCareer Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <div class="background-orb orb-one" aria-hidden="true"></div>
    <div class="background-orb orb-two" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-brand">EduCareer Guide</div>
        <h1 id="login-title">Welcome back</h1>
        <p>Sign in to continue your learning and career journey.</p>

        <form class="login-form">
          <label class="field">
            <span>Email address</span>
            <input type="email" placeholder="you@example.com" />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" placeholder="Enter your password" />
          </label>

          <div class="form-row">
            <label class="checkbox">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button class="btn btn-primary full-width" type="submit">Sign In</button>
        </form>

        <p class="login-footnote">
          New here?
          <a href="index.html">Return to the homepage</a>
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
