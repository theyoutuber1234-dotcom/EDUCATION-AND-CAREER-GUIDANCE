<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | EduCareer Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <div class="background-orb orb-one" aria-hidden="true"></div>
    <div class="background-orb orb-two" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="login-card" aria-labelledby="register-title">
        <div class="login-brand">EduCareer Guide</div>
        <h1 id="register-title">Create your account</h1>
        <p>Start building the right learning and career plan for your next steps.</p>

        <form class="login-form">
          <label class="field">
            <span>Full name</span>
            <input type="text" placeholder="Your name" />
          </label>

          <label class="field">
            <span>Email address</span>
            <input type="email" placeholder="you@example.com" />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" placeholder="Create a password" />
          </label>

          <label class="field">
            <span>Confirm password</span>
            <input type="password" placeholder="Confirm your password" />
          </label>

          <button class="btn btn-primary full-width" type="submit">Create account</button>
        </form>

        <p class="login-footnote">
          Already a member?
          <a href="login.html">Sign in</a>
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
